<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <th:block th:fragment="header">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-box-seam" viewBox="0 0 16 16">
                      <path d="M8.686 1.018a.5.5 0 0 0-.372 0L1.383 3.5 8 6.018 14.617 3.5 8.686 1.018z"/>
                      <path d="M14.617 4.5L8.686 6.982v6.99L14 12.5V5.5a.5.5 0 0 0-.383-.5z"/>
                      <path d="M1 5.5v7l5.314 1.473v-7.01L1 5.5z"/>
                    </svg>
                    Inventario
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item" th:if="${#request.isUserInRole('ROLE_ADMIN')}">
                            <a class="nav-link" th:href="@{/main}">Menu</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/productos}">Productos</a>
                        </li>
                    </ul>

                    <form class="d-flex align-items-center me-3" role="search" onsubmit="return false;">
                        <input id="searchInputNav" class="form-control form-control-sm me-2" type="search" placeholder="Buscar productos" aria-label="Buscar">
                        <button id="toggleViewBtn" class="btn btn-outline-secondary btn-sm" title="Cambiar vista">Tabla</button>
                    </form>

                    <div class="d-flex align-items-center">
                        <a th:if="${#request.isUserInRole('ROLE_ADMIN')}" class="btn btn-primary me-2" th:href="@{/productos/nuevo}">Nuevo producto</a>

                        <a th:if="${#request.isUserInRole('ROLE_ADMIN')}" class="btn btn-outline-dark me-2" th:href="@{/admin/users}">Admin</a>

                        <div th:if="${#request.userPrincipal != null}">
                            <form th:action="@{/logout}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-outline-secondary d-flex align-items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-right" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                                        <path fill-rule="evenodd" d="M6 3a1 1 0 0 0-1 1v2h1V4h7v8H6v-2H5v2a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1H6z"/>
                                        <path fill-rule="evenodd" d="M11.854 8.354a.5.5 0 0 0 0-.708L10.207 6H4.5a.5.5 0 0 0 0 1h5.707l1.647 1.646a.5.5 0 0 0 .707-.292z"/>
                                    </svg>
                                    <span>Cerrar sesión</span>
                                </button>
                            </form>
                        </div>

                        <button id="themeToggleBtn" type="button" class="btn btn-outline-secondary me-2" aria-pressed="false">
                            <span class="theme-toggle__icon" aria-hidden="true">◐</span>
                            <span class="theme-toggle__label">Tema</span>
                        </button>

                        <a th:if="${#request.userPrincipal == null}" class="btn btn-outline-primary" th:href="@{/login}">Iniciar sesión</a>
                    </div>
                </div>
            </div>
        </nav>
    </th:block>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            const storageKey = 'inventario-theme';
            const root = document.documentElement;
            const button = document.getElementById('themeToggleBtn');

            function getPreferredTheme() {
                const saved = window.localStorage.getItem(storageKey);
                if (saved === 'light' || saved === 'dark') {
                    return saved;
                }
                return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            function applyTheme(theme) {
                root.setAttribute('data-theme', theme);
                root.setAttribute('data-bs-theme', theme);
                window.localStorage.setItem(storageKey, theme);

                if (button) {
                    const isDark = theme === 'dark';
                    button.setAttribute('aria-pressed', String(isDark));
                    button.innerHTML = isDark
                        ? '<span class="theme-toggle__icon" aria-hidden="true">☼</span><span class="theme-toggle__label">Claro</span>'
                        : '<span class="theme-toggle__icon" aria-hidden="true">◐</span><span class="theme-toggle__label">Oscuro</span>';
                }
            }

            applyTheme(getPreferredTheme());

            if (button) {
                button.addEventListener('click', function () {
                    applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
                });
            }
        })();
    </script>
</head>
</html>
