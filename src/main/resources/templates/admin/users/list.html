<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuarios - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/inventario.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<main class="page-shell">
    <section class="hero-panel hero-panel--compact w-100">
        <div>
            <p class="eyebrow">Administración</p>
            <h1>Usuarios</h1>
            <p class="hero-copy">Gestiona cuentas, roles y accesos del sistema desde un panel más limpio y legible.</p>
        </div>
        <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-outline-light btn-lg" th:href="@{/main}">Menu</a>
            <a class="btn btn-light btn-lg" th:href="@{/admin/users/new}">Crear nuevo usuario</a>
        </div>
    </section>

    <div class="card admin-card centered-card mt-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${users}">
                            <td th:text="${u.id}"></td>
                            <td class="fw-semibold" th:text="${u.username}"></td>
                            <td><span class="badge text-bg-light border" th:text="${#strings.replace(u.role, 'ROLE_', '')}"></span></td>
                            <td class="text-end">
                                <div class="d-inline-flex gap-2">
                                    <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/users/{id}/edit(id=${u.id})}">Editar</a>
                                    <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post" class="d-inline">
                                        <button class="btn btn-sm btn-outline-danger" type="submit" onclick="return confirm('¿Eliminar usuario?');">Eliminar</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
