<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear usuario - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/inventario.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>
<main class="page-shell page-shell--form">
    <section class="hero-panel hero-panel--compact w-100">
        <div>
            <p class="eyebrow">Administración</p>
            <h1 th:text="${user.id} == null ? 'Crear usuario' : 'Editar usuario'">Crear usuario</h1>
            <p class="hero-copy">Gestiona acceso y permisos con una interfaz clara, sobria y alineada con el resto de la aplicación.</p>
            <div class="hero-chip-row mt-4">
                <span class="hero-chip">Seguridad</span>
                <span class="hero-chip" th:text="${user.id} == null ? 'Alta de usuario' : 'Actualización'">Alta de usuario</span>
                <span class="hero-chip">Acceso por rol</span>
            </div>
        </div>
        <div class="d-flex flex-wrap gap-2 justify-content-end">
            <span class="hero-chip">Campos protegidos</span>
            <a class="btn btn-outline-light btn-lg" th:href="@{/admin/users}">Volver</a>
        </div>
    </section>

    <section class="card form-card form-card--executive centered-card mt-4">
        <div class="card-body p-4 p-md-5">
            <form th:action="${user.id == null} ? @{/admin/users} : @{/admin/users/{id}(id=${user.id})}" th:object="${user}" method="post" class="row g-4">
                <div class="col-12">
                    <div class="form-section">
                        <div class="form-section__header">
                            <p class="main-action-kicker mb-2">Seguridad</p>
                            <h2 class="h5 mb-1">Datos de acceso</h2>
                            <p class="form-help mb-0">El rol define qué partes de la consola puede ver el usuario.</p>
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label">Username</label>
                    <input class="form-control" th:field="*{username}" placeholder="ej. maria" />
                    <div class="text-danger mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>
                <div class="col-12">
                    <label class="form-label">Password <span class="text-muted" th:if="${user.id != null}">(dejar en blanco para mantener)</span></label>
                    <input class="form-control" type="password" th:field="*{password}" placeholder="••••••••" />
                    <div class="text-danger mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
                <div class="col-12">
                    <label class="form-label">Rol</label>
                    <select class="form-select" th:field="*{role}">
                        <option value="USER">user</option>
                        <option value="ADMIN">admin</option>
                    </select>
                </div>
                <div class="col-12 d-flex justify-content-end gap-2 pt-2">
                    <a class="btn btn-outline-secondary" th:href="@{/admin/users}">Cancelar</a>
                    <button class="btn btn-primary" type="submit" th:text="${user.id} == null ? 'Guardar' : 'Actualizar'">Guardar</button>
                </div>
            </form>
        </div>
    </section>
</main>
</body>
</html>
