<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/inventario.css}">
</head>
<body>
<!-- Header -->
<div th:replace="~{fragments/header :: header}"></div>
<main class="page-shell page-shell--form mt-4">
    <section class="hero-panel hero-panel--compact">
        <div>
            <p class="eyebrow">Inventario</p>
            <h1 th:text="${titulo}">Formulario</h1>
            <p class="hero-copy">Completa los campos para registrar o actualizar un producto.</p>
        </div>
        <a class="btn btn-outline-light btn-lg" th:href="@{/productos}">Volver</a>
    </section>

    <div class="card form-card mt-4 centered-card">
        <div class="card-body p-4 p-md-5">
            <form th:action="@{/productos/guardar}" th:object="${producto}" method="post" class="row g-3">
                <input type="hidden" th:field="*{id}">

                <div class="col-12">
                    <label class="form-label" for="nombre">Nombre</label>
                    <input id="nombre" type="text" class="form-control" th:field="*{nombre}" placeholder="Ej. Teclado mecánico">
                    <div class="text-danger small mt-1" th:errors="*{nombre}"></div>
                </div>

                <div class="col-12">
                    <label class="form-label" for="descripcion">Descripción</label>
                    <textarea id="descripcion" class="form-control" th:field="*{descripcion}" rows="4" placeholder="Descripción breve del producto"></textarea>
                    <div class="text-danger small mt-1" th:errors="*{descripcion}"></div>
                </div>

                <div class="col-md-4">
                    <label class="form-label" for="cantidad">Cantidad</label>
                    <input id="cantidad" type="number" min="0" class="form-control" th:field="*{cantidad}">
                    <div class="text-danger small mt-1" th:errors="*{cantidad}"></div>
                </div>

                <div class="col-md-4">
                    <label class="form-label" for="precio">Precio</label>
                    <input id="precio" type="number" min="0" step="0.01" class="form-control" th:field="*{precio}">
                    <div class="text-danger small mt-1" th:errors="*{precio}"></div>
                </div>

                <div class="col-md-4">
                    <label class="form-label" for="categoria">Categoría</label>
                    <input id="categoria" type="text" class="form-control" th:field="*{categoria}" placeholder="Ej. Tecnología">
                    <div class="text-danger small mt-1" th:errors="*{categoria}"></div>
                </div>

                <div class="col-12 d-flex justify-content-end gap-2 pt-2">
                    <a class="btn btn-outline-secondary" th:href="@{/productos}">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
