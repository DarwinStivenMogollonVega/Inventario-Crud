<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/inventario.css}" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="auth-page">
    <section class="auth-card card">
        <div class="card-body p-4 p-md-5">
            <p class="eyebrow text-primary">Acceso</p>
            <h1 class="auth-title">Iniciar sesión</h1>
            <p class="auth-copy mb-4">Usa tus credenciales para administrar productos, usuarios y el panel principal.</p>

            <div th:if="${error}" class="error" th:text="${error}"></div>
            <div th:if="${message}" class="message" th:text="${message}"></div>

            <form th:action="@{/login}" method="post" class="row g-3">
                <div class="col-12">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Ingresa tu usuario" required />
                </div>
                <div class="col-12">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Ingresa tu contraseña" required />
                </div>
                <div class="col-12 d-flex justify-content-end pt-2">
                    <button type="submit" class="btn btn-primary px-4">Entrar</button>
                </div>
            </form>
        </div>
    </section>
</main>
</body>
</html>
